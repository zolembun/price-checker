name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: Wake up Streamlit with Headless Browser
        env:
          APP_URL: "https://price-checker-c9jbnjxesxzdp8jkujfrjl.streamlit.app/"
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }} 
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import os

          url = os.getenv('APP_URL')
          password = os.getenv('APP_PASSWORD')

          def run(pw):
              browser = pw.chromium.launch(headless=True)
              page = browser.new_page()
              
              print(f'กำลังโหลดหน้าเว็บ: {url}')
              # 🔧 แก้ไขที่ 1: เพิ่มเวลาเปิดเว็บเผื่อแอปหลับลึก (รอสูงสุด 2 นาที)
              page.goto(url, timeout=120000)
              
              print('รอช่องใส่รหัสผ่าน...')
              # 🔧 แก้ไขที่ 2: เพิ่มเวลารอช่องใส่รหัสผ่าน (รอสูงสุด 2 นาที)
              page.wait_for_selector('input[type=\"password\"]', timeout=120000)
              page.fill('input[type=\"password\"]', password)
              
              # กดปุ่ม Enter เพื่อล็อกอิน
              page.press('input[type=\"password\"]', 'Enter')
              
              print('กำลังเข้าสู่ระบบและรอโหลดหน้าหลัก...')
              # 🔧 แก้ไขที่ 3: เพิ่มเวลารอโหลดหน้าหลักให้ชัวร์ว่าเข้าได้จริง (รอสูงสุด 1 นาที)
              page.wait_for_selector('text=\"ระบบเช็คราคาสินค้า & AI\"', timeout=60000)
              
              time.sleep(10)
              
              print('✅ จำลองการเข้าใช้งานและล็อกอินสำเร็จ Streamlit ตื่นแล้ว!')
              browser.close()

          with sync_playwright() as pw:
              run(pw)
          "
