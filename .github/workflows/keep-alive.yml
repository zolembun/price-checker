name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install Thai Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-thai-tlwg
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: Wake up Streamlit with Headless Browser
        env:
          APP_URL: "https://price-checker-c9jbnjxesxzdp8jkujfrjl.streamlit.app/"
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }} 
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import os
          import sys

          url = os.getenv('APP_URL')
          password = os.getenv('APP_PASSWORD')

          def run(pw):
              browser = pw.chromium.launch(headless=True)
              page = browser.new_page()
              
              print(f'กำลังโหลดหน้าเว็บ: {url}')
              try:
                  page.goto(url, timeout=120000)
                  
                  print('รอให้หน้าเว็บโหลดสมบูรณ์ (10 วินาที)...')
                  time.sleep(10)
                  
                  print('กำลังค้นหาช่องใส่รหัสผ่าน...')
                  # 🛠️ ปรับ 1: ใช้เป้าหมายที่แม่นยำที่สุดคือช่อง input ที่เป็นประเภท password
                  pwd_input = page.locator('input[type=\"password\"]')
                  pwd_input.wait_for(state='visible', timeout=30000)
                  
                  print('เจอช่องแล้ว กำลังพิมพ์รหัสผ่าน...')
                  pwd_input.fill(password)
                  
                  # 🛠️ ปรับ 2: พัก 1 วินาทีให้ Streamlit (React) รับรู้ว่ามีข้อความถูกพิมพ์แล้ว
                  time.sleep(1)
                  
                  print('กำลังกด Enter...')
                  pwd_input.press('Enter')
                  
                  print('กำลังเข้าสู่ระบบและรอโหลดหน้าหลัก...')
                  # รอโหลด Tag h1 ซึ่งเป็นตัวยืนยันว่าเข้าหน้าหลักสำเร็จ
                  page.wait_for_selector('h1', timeout=60000)
                  
                  # ให้เวลาระบบดึงข้อมูลจาก Google Sheet เล็กน้อย
                  time.sleep(5)
                  print('✅ จำลองการเข้าใช้งานและล็อกอินสำเร็จ Streamlit ตื่นแล้ว!')
                  
              except Exception as e:
                  print(f'❌ ไม่สามารถไปต่อได้: {e}')
                  print('📸 กำลังถ่ายรูปหน้าจอเพื่อใช้เป็นหลักฐาน...')
                  page.screenshot(path='error_screenshot.png', full_page=True)
                  sys.exit(1)
              finally:
                  browser.close()

          with sync_playwright() as pw:
              run(pw)
          "
          
      - name: Upload Screenshot on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bot-error-screenshot
          path: error_screenshot.png
          retention-days: 3
