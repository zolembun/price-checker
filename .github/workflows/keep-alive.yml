name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: Wake up Streamlit with Headless Browser
        env:
          APP_URL: "https://price-checker-c9jbnjxesxzdp8jkujfrjl.streamlit.app/"
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }} 
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import os
          import sys

          url = os.getenv('APP_URL')
          password = os.getenv('APP_PASSWORD')

          def run(pw):
              browser = pw.chromium.launch(headless=True)
              page = browser.new_page()
              
              print(f'กำลังโหลดหน้าเว็บ: {url}')
              try:
                  # เปิดหน้าเว็บ รอสูงสุด 2 นาทีเผื่อแอปกำลังตื่น
                  page.goto(url, timeout=120000)
                  
                  # พักหายใจ 10 วินาที ให้ชัวร์ว่าองค์ประกอบบนหน้าเว็บโหลดครบ
                  time.sleep(10)
                  
                  print('กำลังค้นหาช่องใส่รหัสผ่าน...')
                  # ลดเวลารอลงมาที่ 30 วินาที (ถ้า 30 วิยังไม่เจอ แปลว่าติดหน้าอื่นแน่นอน)
                  page.wait_for_selector('input[type=\"password\"]', timeout=30000)
                  page.fill('input[type=\"password\"]', password)
                  
                  page.press('input[type=\"password\"]', 'Enter')
                  
                  print('กำลังเข้าสู่ระบบและรอโหลดหน้าหลัก...')
                  page.wait_for_selector('text=\"ระบบเช็คราคาสินค้า & AI\"', timeout=60000)
                  
                  time.sleep(10)
                  print('✅ จำลองการเข้าใช้งานและล็อกอินสำเร็จ Streamlit ตื่นแล้ว!')
                  
              except Exception as e:
                  print(f'❌ ไม่สามารถไปต่อได้: {e}')
                  print('📸 กำลังถ่ายรูปหน้าจอเพื่อใช้เป็นหลักฐาน...')
                  # สั่งถ่ายรูปหน้าจอแบบเต็มหน้า
                  page.screenshot(path='error_screenshot.png', full_page=True)
                  # สั่งให้หยุดและแจ้ง GitHub ว่าทำงานไม่สำเร็จ
                  sys.exit(1)
              finally:
                  browser.close()

          with sync_playwright() as pw:
              run(pw)
          "
          
      # ขั้นตอนนี้จะทำงานเฉพาะตอนที่สคริปต์ด้านบนเกิด Error เพื่ออัปโหลดรูปภาพให้เราดาวน์โหลด
      - name: Upload Screenshot on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bot-error-screenshot
          path: error_screenshot.png
          retention-days: 3
