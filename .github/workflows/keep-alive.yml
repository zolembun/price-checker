name: Keep Streamlit App Alive

on:
  schedule:
    # ทำงานทุกๆ 12 ชั่วโมง
    - cron: "0 */12 * * *"
  # อนุญาตให้กดปุ่มสั่งงานเองได้
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # ขั้นตอนที่ 1: ติดตั้ง Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # ขั้นตอนที่ 2: ติดตั้ง Playwright สำหรับจำลองเบราว์เซอร์
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      # ขั้นตอนที่ 3: รันสคริปต์ Python เพื่อเปิดหน้าแอป
      - name: Wake up Streamlit with Headless Browser
        env:
          # 👇 เปลี่ยน URL ตรงนี้เป็นลิงก์แอปของคุณครับ
          APP_URL: "https://price-checker-c9jbnjxesxzdp8jkujfrjl.streamlit.app/"
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import os

          url = os.getenv('APP_URL')

          def run(pw):
              # เปิดเบราว์เซอร์แบบไม่แสดงหน้าต่าง (Headless)
              browser = pw.chromium.launch(headless=True)
              page = browser.new_page()
              
              print(f'กำลังโหลดหน้าเว็บ: {url}')
              page.goto(url)
              
              # รอ 10 วินาที เพื่อให้ Streamlit เชื่อมต่อ WebSocket และโหลดข้อมูลสำเร็จ
              time.sleep(10)
              
              print('✅ จำลองการเข้าใช้งานสำเร็จ Streamlit ตื่นแล้ว!')
              browser.close()

          with sync_playwright() as pw:
              run(pw)
          "
