name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # อัปเดตเป็น v6 เพื่อแก้ไขคำเตือน Node.js 20 Deprecated
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: Wake up Streamlit with Headless Browser
        env:
          APP_URL: "https://price-checker-c9jbnjxesxzdp8jkujfrjl.streamlit.app/"
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import os

          url = os.getenv('APP_URL')

          def run(pw):
              browser = pw.chromium.launch(headless=True)
              page = browser.new_page()
              
              print(f'กำลังโหลดหน้าเว็บ: {url}')
              page.goto(url)
              
              time.sleep(10)
              
              print('✅ จำลองการเข้าใช้งานสำเร็จ Streamlit ตื่นแล้ว!')
              browser.close()

          with sync_playwright() as pw:
              run(pw)
          "
