name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install Thai Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-thai-tlwg
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          
      - name: Wake up Streamlit with Headless Browser
        env:
          APP_URL: "https://price-checker-c9jbnjxesxzdp8jkujfrjl.streamlit.app/"
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }} 
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          import os
          import sys

          url = os.getenv('APP_URL')
          password = os.getenv('APP_PASSWORD')

          def run(pw):
              browser = pw.chromium.launch(headless=True)
              page = browser.new_page()
              
              print(f'🌐 กำลังโหลดหน้าเว็บ: {url}')
              try:
                  page.goto(url, timeout=120000)
                  print('⏳ รอหน้าเว็บโหลดเบื้องต้น 15 วินาที...')
                  time.sleep(15)
                  
                  # 🛠️ ขั้นตอนพิเศษ: ตรวจสอบและปลุกแอปหากแอปเข้าโหมด Sleep
                  print('🔍 ตรวจสอบว่าแอปหลับอยู่หรือไม่...')
                  wake_up_button = page.locator('button:has-text(\"Yes, get this app back up!\")')
                  
                  if wake_up_button.count() > 0 and wake_up_button.is_visible():
                      print('🚨 เจอหน้าจอ App Sleeping! กำลังกดปุ่ม [Yes, get this app back up!] เพื่อปลุกแอป...')
                      wake_up_button.click()
                      print('⏳ กดปลุกแล้ว รอระบบเปิดเซิร์ฟเวอร์ใหม่ 45 วินาที...')
                      time.sleep(45)
                      # โหลดหน้าเว็บซ้ำอีกครั้งหลังจากปลุกแล้ว
                      page.goto(url, timeout=120000)
                      time.sleep(15)
                  else:
                      print('👍 ไม่พบหน้าจอแอปหลับ หรือแอปตื่นอยู่แล้ว ดำเนินการต่อไป...')

                  print('🔎 กำลังค้นหาช่องใส่รหัสผ่าน...')
                  pwd_input = page.locator('input[type=\"password\"]')
                  pwd_input.wait_for(state='visible', timeout=45000)
                  
                  print('👆 เจอช่องแล้ว กำลังคลิกและพิมพ์รหัสผ่าน...')
                  pwd_input.click()
                  time.sleep(1)
                  
                  if password:
                      pwd_input.press_sequentially(password, delay=150)
                      print(f'⌨️ พิมพ์รหัสผ่านเรียบร้อย (ความยาว {len(password)} ตัวอักษร)')
                  else:
                      print('⚠️ เตือน: ไม่พบตัวแปรรหัสผ่านใน Secrets!')
                  
                  time.sleep(2)
                  print('↩️ กำลังกด Enter เพื่อเข้าสู่ระบบ...')
                  pwd_input.press('Enter')
                  
                  print('⏳ รอโหลดหน้าจอหลักหลักสำเร็จ...')
                  page.wait_for_selector('h1', timeout=60000)
                  
                  time.sleep(10)
                  print('✅ ภารกิจสำเร็จ! สามารถปลุกและล็อกอินเข้าหน้าหลักแอปตื่นเรียบร้อย!')
                  
              except Exception as e:
                  print(f'❌ เกิดข้อผิดพลาดในระบบ: {e}')
                  print('📸 กำลังบันทึกภาพหน้าจอล่าสุดเป็นหลักฐาน...')
                  page.screenshot(path='error_screenshot.png', full_page=True)
                  sys.exit(1)
              finally:
                  browser.close()

          with sync_playwright() as pw:
              run(pw)
          "
          
      - name: Upload Screenshot on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bot-error-screenshot
          path: error_screenshot.png
          retention-days: 3
